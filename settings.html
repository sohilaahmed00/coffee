<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cloud Coffee | إعدادات الحساب</title>
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#beb3ad",
                        "surface-bright": "#3c3936",
                        "tertiary-container": "#a59a92",
                        "surface-variant": "#373432",
                        "surface": "#151311",
                        "on-secondary-fixed": "#201a17",
                        "primary-container": "#b8966e",
                        "inverse-primary": "#755936",
                        "surface-container-highest": "#373432",
                        "on-tertiary-fixed": "#211a15",
                        "surface-dim": "#151311",
                        "surface-container-lowest": "#100e0c",
                        "on-error": "#690005",
                        "on-primary-fixed": "#2a1700",
                        "secondary": "#cfc4be",
                        "background": "#151311",
                        "inverse-surface": "#e8e1dd",
                        "primary": "#e5c095",
                        "inverse-on-surface": "#33302d",
                        "error-container": "#93000a",
                        "on-primary": "#422c0d",
                        "on-surface-variant": "#d2c4b8",
                        "on-tertiary-fixed-variant": "#4e453f",
                        "outline": "#9b8f83",
                        "surface-container-high": "#2c2927",
                        "surface-container": "#221f1d",
                        "tertiary-fixed": "#eee0d7",
                        "on-primary-fixed-variant": "#5b4221",
                        "on-surface": "#e8e1dd",
                        "surface-container-low": "#1d1b19",
                        "tertiary-fixed-dim": "#d1c4bc",
                        "on-secondary": "#362f2b",
                        "error": "#ffb4ab",
                        "on-error-container": "#ffdad6",
                        "on-background": "#e8e1dd",
                        "tertiary": "#d1c4bc",
                        "on-primary-container": "#462f10",
                        "primary-fixed": "#ffddb7",
                        "outline-variant": "#4e453c",
                        "secondary-fixed-dim": "#cfc4be",
                        "secondary-container": "#4d4541",
                        "on-tertiary-container": "#3a322c",
                        "secondary-fixed": "#ece0da",
                        "primary-fixed-dim": "#e5c095",
                        "on-secondary-fixed-variant": "#4d4541",
                        "surface-tint": "#e5c095",
                        "on-tertiary": "#362f29"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max-width-content": "1200px",
                        "margin-mobile": "20px",
                        "unit": "8px",
                        "gutter-desktop": "24px",
                        "gutter-mobile": "16px",
                        "margin-desktop": "auto"
                    },
                    "fontFamily": {
                        "headline-xl": ["Tajawal", "sans-serif"],
                        "headline-lg": ["Tajawal", "sans-serif"],
                        "headline-lg-mobile": ["Tajawal", "sans-serif"],
                        "body-md": ["Tajawal", "sans-serif"],
                        "label-sm": ["Tajawal", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-xl": ["Tajawal", "sans-serif"],
                        "headline-lg": ["Tajawal", "sans-serif"],
                        "headline-lg-mobile": ["Tajawal", "sans-serif"],
                        "body-md": ["Tajawal", "sans-serif"],
                        "label-sm": ["Tajawal", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(34, 31, 29, 0.9), rgba(26, 24, 22, 0.9));
            border: 1px solid rgba(155, 143, 131, 0.15);
        }

        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background font-body-md overflow-x-hidden selection:bg-primary/30 selection:text-primary pb-24">

    <!-- Top App Bar -->
    <header
        class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-background/80 backdrop-blur-md border-b border-outline-variant/10">
        <div class="flex items-center gap-4">
            <button
                class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant transition-colors"
                id="menuToggle">
                <span class="material-symbols-outlined text-primary">menu</span>
            </button>
            <h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary tracking-tight">Cloud
                Coffee</h1>
        </div>
        <div class="flex items-center gap-2">
            <a href="browse.html"
                class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant transition-colors active:scale-95 duration-150">
                <span class="material-symbols-outlined text-primary">search</span>
            </a>
        </div>
    </header>

    <!-- Main Container -->
    <main class="pt-20 pb-24 px-margin-mobile max-w-lg mx-auto">
        <!-- Profile Editing Form -->
        <section class="mb-8">
            <div class="bg-surface-container rounded-2xl p-6 border border-outline-variant/20 shadow-xl text-right">
                <h3 class="font-headline-lg text-lg text-primary mb-4">تعديل البيانات الشخصية</h3>
                <div class="space-y-4">
                    <div>
                        <label for="inputName"
                            class="block text-sm font-semibold text-on-surface-variant mb-2">الاسم</label>
                        <input type="text" id="inputName"
                            class="w-full bg-surface-container-high border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-all text-right font-body-md"
                            placeholder="أدخل اسمك..." />
                    </div>
                    <div>
                        <label for="inputStatus" class="block text-sm font-semibold text-on-surface-variant mb-2">الحالة
                            / اللقب</label>
                        <input type="text" id="inputStatus"
                            class="w-full bg-surface-container-high border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-all text-right font-body-md"
                            placeholder="أدخل حالتك (مثال: عميل مميز)..." />
                    </div>
                    <button onclick="handleSaveProfile()"
                        class="w-full py-4 bg-primary text-on-primary rounded-xl font-bold flex items-center justify-center gap-2 hover:brightness-110 active:scale-95 transition-all mt-6 shadow-xl shadow-primary/10">
                        <span class="material-symbols-outlined">save</span>
                        حفظ التغييرات
                    </button>
                </div>
            </div>
        </section>

        <!-- Menu Navigation Section -->
        <section class="space-y-3">
            <h3 class="text-on-surface-variant font-label-sm px-2 mb-2 text-right">إعدادات سريعة</h3>
            <nav class="flex flex-col gap-2">
                <a class="flex items-center justify-between p-4 rounded-xl bg-surface-container-low hover:bg-surface-variant transition-colors group text-right"
                    href="map.html">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
                            <span class="material-symbols-outlined">home</span>
                        </div>
                        <span class="text-on-surface font-body-md text-sm">الرئيسية</span>
                    </div>
                    <span class="material-symbols-outlined text-on-surface-variant">chevron_left</span>
                </a>
                <a class="flex items-center justify-between p-4 rounded-xl bg-surface-container-low hover:bg-surface-variant transition-colors group text-right"
                    href="browse.html">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
                            <span class="material-symbols-outlined">coffee_maker</span>
                        </div>
                        <span class="text-on-surface font-body-md text-sm">تصفح الكافيهات</span>
                    </div>
                    <span class="material-symbols-outlined text-on-surface-variant">chevron_left</span>
                </a>
            </nav>
        </section>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav
        class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-surface-container-high/90 backdrop-blur-md border-t border-outline-variant/30 rounded-t-xl shadow-lg">
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors"
            href="map.html">
            <span class="material-symbols-outlined">home</span>
            <span class="font-label-sm text-label-sm">الرئيسية</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors"
            href="browse.html">
            <span class="material-symbols-outlined">coffee_maker</span>
            <span class="font-label-sm text-label-sm">تصفح الكافيهات</span>
        </a>
    </nav>

    <!-- Navigation Drawer (Right Side) -->
    <div class="fixed inset-0 bg-black/60 z-[60] hidden backdrop-blur-sm opacity-0 transition-opacity duration-300"
        id="drawerOverlay"></div>
    <aside
        class="fixed top-0 right-0 h-full w-80 bg-surface-container shadow-2xl z-[70] transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col py-8 px-6"
        id="navDrawer">
        <div class="flex flex-col h-full">
            <!-- Drawer Links -->
            <nav class="flex flex-col gap-2 flex-grow">
                <a class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface hover:bg-surface-variant transition-all"
                    href="map.html">
                    <span class="material-symbols-outlined">home</span>
                    <span>الرئيسية</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface hover:bg-surface-variant transition-all"
                    href="browse.html">
                    <span class="material-symbols-outlined">coffee_maker</span>
                    <span>تصفح الكافيهات</span>
                </a>

            </nav>

            <footer class="text-center text-xs text-outline-variant mt-auto">
                Cloud Coffee v2.4.0
            </footer>
        </div>
    </aside>

    <!-- Shared State Management Scripts -->
    <script src="shared.js"></script>

    <script>
        // Handle form loading
        document.addEventListener('DOMContentLoaded', () => {
            const profile = getProfile();
            document.getElementById('inputName').value = profile.name;
            document.getElementById('inputStatus').value = profile.status;
        });

        // Handle form saving
        function handleSaveProfile() {
            const nameVal = document.getElementById('inputName').value.trim();
            const statusVal = document.getElementById('inputStatus').value.trim();

            if (!nameVal || !statusVal) {
                showToast('⚠️ يرجى تعبئة جميع الحقول', 'error');
                return;
            }

            saveProfile({
                name: nameVal,
                status: statusVal
            });

            showToast('تم حفظ التغييرات بنجاح ✨', 'done');
        }
    </script>
</body>

</html>
