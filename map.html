    <style>
        body {
            background-color: #151311;

        }

        }

        /* Glassmorphism & Tonal Layering */
        .glass-sheet {
            background: rgba(34, 31, 29, 0.85);

        }

            background: #b8966e;
            border-radius: 10px;
        }

        /* Map Marker Animation */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .marker-pulse {
            animation: pulse 2s infinite ease-in-out;
        }

        /* Custom Leaflet Dark Mode & Gold Adjustments */
        #map {
            background-color: #151311;
        }
        .leaflet-container {
            background: #151311 !important;
            font-family: 'Tajawal', sans-serif !important;
        }
        /* Style Leaflet controls to look gold and dark */
        .leaflet-bar {
            border: 1px solid rgba(155, 143, 131, 0.15) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6) !important;
            border-radius: 8px !important;
            overflow: hidden;
        }
        .leaflet-bar a {
            background-color: #221f1d !important;
            color: #e5c095 !important;
            border-bottom: 1px solid rgba(155, 143, 131, 0.1) !important;
            transition: all 0.2s ease;
        }
        .leaflet-bar a:hover {
            background-color: #373432 !important;
            color: #ffddb7 !important;
        }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            font-weight: bold !important;
        }
        .leaflet-control-attribution {
            background: rgba(21, 19, 17, 0.8) !important;
            color: #9b8f83 !important;
            font-size: 10px !important;
            border-radius: 4px;
            padding: 2px 6px !important;
        }
        .leaflet-control-attribution a {
            color: #e5c095 !important;
        }
        /* Custom User Location Glow */
        .user-gps-pulse {
            position: relative;
        }
        .user-gps-pulse::after {
            content: '';
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.35);
            position: absolute;
            top: -6px;
            left: -6px;
            animation: user-ping 2s infinite ease-out;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        @keyframes user-ping {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        /* Custom Leaflet Popup styling */
        .leaflet-popup-content-wrapper {
            background: #221f1d !important;
            color: #e8e1dd !important;
            border: 1px solid rgba(155, 143, 131, 0.2) !important;
            border-radius: 12px !important;

        }

<script>
    // --- 1. PREDEFINED CAFES CONFIGURATION ---

    // We use relative latOffset/lngOffset so they automatically spawn around YOUR live GPS location,
    // providing a realistic navigation experience anywhere in the world!

        },
        {
            id: "artisan",
            name: "كوفي أرتيزان",
            latOffset: -0.0035,  // ~350m South
            lngOffset: 0.0045,   // ~450m East
            rating: 4.9,
            distance: "800 م",
            time: "8 دقائق مشي",
            image: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=800&auto=format&fit=crop",
            tag: "مفتوح الآن",
            about: "لعشاق القهوة المختصة، نقدم لكم أفضل أنواع البن المحمص يدوياً بكل حب."
        },
        {
            id: "night",
            name: "كوفي نايت",
            latOffset: 0.0050,   // ~500m North
            lngOffset: 0.0060,   // ~600m East
            rating: 4.6,
            distance: "1.2 كم",
            time: "15 دقيقة مشي",
            image: "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=80&w=800&auto=format&fit=crop",
            tag: "مسائي رائع",
            about: "وجهتك المثالية للعمل أو الدراسة في ساعات المساء المتأخرة مع كوب من القهوة الدافئة."
        },
        {
            id: "corner",
            name: "ركن القهوة",
            latOffset: -0.0040,  // ~400m South
            lngOffset: -0.0035,  // ~350m West
            rating: 4.7,
            distance: "2.5 كم",
            time: "30 دقيقة مشي",
            image: "https://images.unsplash.com/photo-1453614512568-c4024d13c247?q=80&w=800&auto=format&fit=crop",
            tag: "تراثي خشبي",
            about: "تصاميم خشبية دافئة وتشكيلة واسعة من الحلويات الطازجة التي تناسب قهوتك العربية."
        }
    ];

    // --- 2. GLOBAL STATE ---
    let map;
    let userMarker;
    let cafeMarkers = [];
    let userLat = 24.7136; // Default Center (Riyadh)
    let userLng = 46.6753;
    let cafesData = [];
    let isExpanded = false;

    // Custom Map Markers Icons using Leaflet divIcon
    const cafeIcon = L.divIcon({
        html: `
            <div class="bg-primary text-on-primary w-10 h-10 rounded-xl border-2 border-surface flex items-center justify-center shadow-2xl transform transition-all duration-300 hover:scale-125 active:scale-95 cursor-pointer hover:shadow-primary/30">
                <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">coffee</span>
            </div>
        `,
        className: 'custom-div-icon',
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });

    const userIcon = L.divIcon({
        html: `
            <div class="relative flex items-center justify-center user-gps-pulse">
                <div class="relative bg-blue-500 text-white w-6 h-6 rounded-full border-2 border-white flex items-center justify-center shadow-2xl z-10">
                    <span class="material-symbols-outlined text-[14px]">my_location</span>
                </div>
            </div>
        `,
        className: 'custom-div-icon',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
    });

    // --- 3. INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
        // Initialize Map
        map = L.map('map', {
            zoomControl: false, // Disabling standard zoom for custom themed placement
            rtl: true
        }).setView([userLat, userLng], 14);

        // Custom Zoom Control position
        L.control.zoom({
            position: 'topleft'
        }).addTo(map);

        // Load stunning CartoDB Dark Matter tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Force Leaflet to recalculate container size
        setTimeout(() => {
            map.invalidateSize();
        }, 100);

        // Query Browser GPS Geolocation
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLat = position.coords.latitude;
                    userLng = position.coords.longitude;
                    
                    showToast('تم جلب موقعك الحالي بنجاح 📍', 'my_location');
                    setupMapState();
                },
                (error) => {
                    console.warn('Geolocation failed or denied, using defaults.', error);
                    showToast('تم استخدام الموقع الافتراضي للمنصة 📍', 'nearby');
                    setupMapState();
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        } else {
            showToast('تم استخدام الموقع الافتراضي للمنصة 📍', 'nearby');
            setupMapState();
        }

        // Header transparency scroll controller
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 20) {
                header.classList.add('bg-background/95', 'backdrop-blur-md', 'shadow-md');
            } else {
                header.classList.remove('bg-background/95', 'backdrop-blur-md', 'shadow-md');
            }
        });

        // Bottom Sheet Pull Bar
        let sheet = document.getElementById('bottom-sheet');
        sheet.querySelector('.pull-bar').addEventListener('click', () => {
            if (!isExpanded) {
                sheet.style.height = '75%';
            } else {
                sheet.style.height = '320px';
            }
            isExpanded = !isExpanded;
        });
    });

    // --- 4. MAP AND MARKERS SETUP ---
    function setupMapState() {
        // 1. Center map on resolved user location
        map.setView([userLat, userLng], 15);

        // 2. Put user dynamic GPS marker
        if (userMarker) {
            userMarker.setLatLng([userLat, userLng]);
        } else {
            userMarker = L.marker([userLat, userLng], { icon: userIcon }).addTo(map);
            userMarker.bindPopup(`<strong class="text-surface font-bold text-center block text-sm">موقعك الحالي</strong>`);
        }

        // 3. Calculate absolute coordinates for predefined cafes based on offset
        cafesData = PREDEFINED_CAFES.map(cafe => {
            return {
                ...cafe,
                lat: userLat + cafe.latOffset,
                lng: userLng + cafe.lngOffset
            };
        });

        // 4. Draw Cafe Markers on map
        clearCafeMarkers();
        cafesData.forEach(cafe => {
            const marker = L.marker([cafe.lat, cafe.lng], { icon: cafeIcon }).addTo(map);
            
            // Standard Popup text
            marker.bindPopup(`<strong class="text-surface font-bold text-center block text-sm">${cafe.name}</strong>`);
            marker.cafeId = cafe.id;
            
            // Marker Tap Event
            marker.on('click', () => {
                focusCafe(cafe.id);
            });
            
            cafeMarkers.push(marker);
        });

        // 5. Render Cafe Cards list inside the bottom sheet
        renderCafeCards();
    }

    function clearCafeMarkers() {
        cafeMarkers.forEach(m => map.removeLayer(m));
        cafeMarkers = [];
    }

    // --- 5. RENDER CARDS & DYNAMIC INTERACTION ---
    function renderCafeCards() {
        const container = document.getElementById('cafe-cards-container');
        if (!container) return;

        container.innerHTML = cafesData.map(cafe => {
            return `
                <div onclick="focusCafe('${cafe.id}')" class="bg-surface-container p-4 rounded-xl border border-outline-variant/10 hover:border-primary/40 transition-all flex gap-4 items-center group cursor-pointer text-right">
                    <div class="relative w-20 h-20 rounded-lg overflow-hidden shrink-0 border border-outline-variant/20">
                        <img class="w-full h-full object-cover transition-transform group-hover:scale-110" src="${cafe.image}" alt="${cafe.name}"/>
                        <div class="absolute top-1 left-1 bg-green-500 w-2 h-2 rounded-full border border-surface"></div>
                    </div>
                    <div class="flex-grow">
                        <div class="flex justify-between items-start">
                            <h3 class="text-[18px] font-bold text-on-surface group-hover:text-primary transition-colors">${cafe.name}</h3>
                            <div class="flex items-center gap-1 text-primary">
                                <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">star</span>
                                <span class="font-bold text-[14px]">${cafe.rating}</span>
                            </div>
                        </div>
                        <p class="text-body-md text-on-surface-variant mb-2">${cafe.distance} • ${cafe.time}</p>
                        <div class="flex gap-2">
                            <span class="bg-primary-container/20 text-primary px-2 py-0.5 rounded text-[10px] font-bold uppercase">${cafe.tag}</span>
                            <span class="bg-surface-variant text-on-surface-variant px-2 py-0.5 rounded text-[10px] font-bold uppercase">سحابي</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function focusCafe(cafeId) {
        const cafe = cafesData.find(c => c.id === cafeId);
        if (!cafe) return;

        // Pan camera
        map.setView([cafe.lat, cafe.lng], 16, { animate: true, duration: 1 });

        // Update markers scale representation visually if desired, and trigger popup
        const marker = cafeMarkers.find(m => m.cafeId === cafeId);
        if (marker) {
            marker.openPopup();
        }

        // Show focused details bottom card
        showCafeDetailsInSheet(cafe);
    }

    function showCafeDetailsInSheet(cafe) {
        const container = document.getElementById('bottom-sheet');
        if (!container) return;

        // Adjust sheet height to accommodate actions
        container.style.height = '360px';
        isExpanded = true;

        const contentDiv = container.querySelector('.px-margin-mobile');
        contentDiv.innerHTML = `
            <div class="flex flex-col gap-4">
                <!-- Header with Back Button -->
                <div class="flex justify-between items-center">
                    <button onclick="resetBottomSheet()" class="flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                        <span class="font-bold text-[14px]">العودة للقائمة</span>
                    </button>
                    <span class="bg-primary-container/20 text-primary px-3 py-1 rounded-full text-[12px] font-bold">${cafe.tag}</span>
                </div>
                
                <!-- Cafe Card Info -->
                <div class="flex gap-4 items-center">
                    <div class="relative w-20 h-20 rounded-xl overflow-hidden shrink-0 border border-outline-variant/30">
                        <img class="w-full h-full object-cover" src="${cafe.image}" alt="${cafe.name}"/>
                    </div>
                    <div class="flex-grow text-right">
                        <div class="flex justify-between items-start">
                            <h3 class="text-xl font-bold text-primary">${cafe.name}</h3>
                            <div class="flex items-center gap-1 text-primary">
                                <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">star</span>
                                <span class="font-bold text-[16px]">${cafe.rating}</span>
                            </div>
                        </div>
                        <p class="text-body-md text-on-surface-variant flex items-center gap-1 mt-1">
                            <span class="material-symbols-outlined text-[16px]">directions_walk</span>
                            <span>${cafe.distance} • ${cafe.time}</span>
                        </p>
                    </div>
                </div>
                
                <p class="text-sm text-on-surface-variant text-right border-t border-outline-variant/10 pt-3 leading-relaxed">
                    ${cafe.about || 'مقهى سحابي مميز يقدم القهوة المختصة والحلويات الفاخرة.'}
                </p>
                
                <!-- Action Buttons -->
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <a href="navigation.html?userLat=${userLat}&userLng=${userLng}&cafeLat=${cafe.lat}&cafeLng=${cafe.lng}&name=${encodeURIComponent(cafe.name)}&distance=${encodeURIComponent(cafe.distance)}&time=${encodeURIComponent(cafe.time)}" class="bg-primary text-on-primary h-12 rounded-xl font-bold flex items-center justify-center gap-2 hover:brightness-110 active:scale-95 transition-all text-center shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined text-[20px]">navigation</span>
                        ابدأ الاتجاهات
                    </a>
                    <a href="menu.html?id=${cafe.id}" class="bg-surface-variant text-on-surface border border-outline-variant/30 h-12 rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-surface-variant/80 active:scale-95 transition-all text-center">
                        <span class="material-symbols-outlined text-[20px]">coffee_maker</span>
                        طلب المنتجات
                    </a>
                </div>
            </div>
        `;
    }

    function resetBottomSheet() {
        const container = document.getElementById('bottom-sheet');
        if (!container) return;

        container.style.height = '320px';
        isExpanded = false;

        const contentDiv = container.querySelector('.px-margin-mobile');
        contentDiv.innerHTML = `
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-headline-lg text-on-surface font-semibold">الكوفيهات القريبة</h2>
                <a href="browse.html" class="text-primary font-bold text-[14px] cursor-pointer">رؤية الكل</a>
            </div>
            <div id="cafe-cards-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Dynamically populated -->
            </div>
        `;
        renderCafeCards();
    }

    // --- 6. FLOATING FAB AND FILTER ACTIONS ---
    function centerOnUser() {
        if (map && userMarker) {
            map.setView([userLat, userLng], 15, { animate: true, duration: 1.2 });
            showToast('تم تحديد موقعك بدقة 📍', 'my_location');
        }
    }

    function filterNearby() {
        showToast('جاري تصفية الكوفيهات القريبة 📍', 'nearby');
        // Sort by total distance offset magnitude ascending
        cafesData.sort((a, b) => {
            const distA = Math.sqrt(Math.pow(a.latOffset, 2) + Math.pow(a.lngOffset, 2));
            const distB = Math.sqrt(Math.pow(b.latOffset, 2) + Math.pow(b.lngOffset, 2));
            return distA - distB;
        });
        renderCafeCards();
    }

    function filterHighestRated() {
        showToast('عرض الكوفيهات الأعلى تقييماً ⭐', 'star');
        // Sort by rating descending
        cafesData.sort((a, b) => b.rating - a.rating);
        renderCafeCards();
        if (cafesData.length > 0) {
            focusCafe(cafesData[0].id);
        }
    }

    function filterOpenNow() {
        showToast('عرض الكوفيهات المفتوحة الآن 🕒', 'schedule');
        // Predefined cafes are active, re-render standard list
        renderCafeCards();
    }
</script>
</body>
</html>
