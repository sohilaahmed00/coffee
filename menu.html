<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cloud Coffee | كوفي هدوء - القائمة</title>
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">

            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#beb3ad",
                        "surface-bright": "#3c3936",
                        "tertiary-container": "#a59a92",
                        "surface-variant": "#373432",
                        "surface": "#151311",
                        "on-secondary-fixed": "#201a17",
                        "primary-container": "#b8966e",
                        "inverse-primary": "#755936",
                        "surface-container-highest": "#373432",
                        "on-tertiary-fixed": "#211a15",
                        "surface-dim": "#151311",
                        "surface-container-lowest": "#100e0c",
                        "on-error": "#690005",
                        "on-primary-fixed": "#2a1700",
                        "secondary": "#cfc4be",
                        "background": "#151311",
                        "inverse-surface": "#e8e1dd",
                        "primary": "#e5c095",
                        "inverse-on-surface": "#33302d",
                        "error-container": "#93000a",
                        "on-primary": "#422c0d",
                        "on-surface-variant": "#d2c4b8",
                        "on-tertiary-fixed-variant": "#4e453f",
                        "outline": "#9b8f83",
                        "surface-container-high": "#2c2927",
                        "surface-container": "#221f1d",
                        "tertiary-fixed": "#eee0d7",
                        "on-primary-fixed-variant": "#5b4221",
                        "on-surface": "#e8e1dd",
                        "surface-container-low": "#1d1b19",
                        "tertiary-fixed-dim": "#d1c4bc",
                        "on-secondary": "#362f2b",
                        "error": "#ffb4ab",
                        "on-error-container": "#ffdad6",
                        "on-background": "#e8e1dd",
                        "tertiary": "#d1c4bc",
                        "on-primary-container": "#462f10",
                        "primary-fixed": "#ffddb7",
                        "outline-variant": "#4e453c",
                        "secondary-fixed-dim": "#cfc4be",
                        "secondary-container": "#4d4541",
                        "on-tertiary-container": "#3a322c",
                        "secondary-fixed": "#ece0da",
                        "primary-fixed-dim": "#e5c095",
                        "on-secondary-fixed-variant": "#4d4541",
                        "surface-tint": "#e5c095",
                        "on-tertiary": "#362f29"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max-width-content": "1200px",
                        "margin-mobile": "20px",
                        "unit": "8px",
                        "gutter-desktop": "24px",
                        "gutter-mobile": "16px",
                        "margin-desktop": "auto"
                    },
                    "fontFamily": {
                        "headline-xl": ["Tajawal", "sans-serif"],
                        "headline-lg": ["Tajawal", "sans-serif"],
                        "headline-lg-mobile": ["Tajawal", "sans-serif"],
                        "body-md": ["Tajawal", "sans-serif"],
                        "label-sm": ["Tajawal", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-xl": ["Tajawal", "sans-serif"],
                        "headline-lg": ["Tajawal", "sans-serif"],
                        "headline-lg-mobile": ["Tajawal", "sans-serif"],
                        "body-md": ["Tajawal", "sans-serif"],
                        "label-sm": ["Tajawal", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }

        .scroll-hide::-webkit-scrollbar {
            display: none;
        }

        .scroll-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background font-body-md overflow-x-hidden selection:bg-primary/30 selection:text-primary pb-24">

    <!-- Top App Bar -->
    <header
        class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-background/80 backdrop-blur-md border-b border-outline-variant/10">
        <div class="flex items-center gap-4">
            <button
                class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant transition-colors"
                id="menuToggle">
                <span class="material-symbols-outlined text-primary">menu</span>
            </button>
            <h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary tracking-tight">Cloud
                Coffee</h1>
        </div>
        <div class="flex items-center gap-2">
            <a href="browse.html"
                class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant transition-colors active:scale-95 duration-150">
                <span class="material-symbols-outlined text-primary">search</span>
            </a>
        </div>
    </header>

    <main class="mt-16">
        <!-- Shop Hero Section -->
        <section class="relative h-64 w-full">
            <img id="cafe-hero-image" alt="كوفي" class="w-full h-full object-cover"
                src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=1200&auto=format&fit=crop" />
            <div class="absolute inset-0 bg-gradient-to-t from-background via-background/20 to-transparent"></div>
            <!-- Floating Back Button -->
            <a href="browse.html"
                class="absolute top-4 right-4 z-10 bg-surface-container/60 backdrop-blur-md p-2 rounded-lg text-on-surface hover:bg-surface-container transition-colors active:scale-95">
                <span class="material-symbols-outlined">arrow_forward</span>
            </a>
            <!-- Floating Favorite Button -->
            <button id="favorite-cafe-btn"
                class="absolute top-4 left-4 z-10 bg-surface-container/60 backdrop-blur-md p-2 rounded-lg text-on-surface hover:bg-surface-container transition-colors active:scale-95 border border-white/10 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary" id="fav-heart-icon"
                    style="font-variation-settings: 'FILL' 0;">favorite</span>
            </button>
        </section>

        <!-- Shop Info Section -->
        <section class="px-margin-mobile -mt-12 relative z-10">
            <div class="bg-surface-container rounded-xl p-6 shadow-2xl border border-outline-variant/20">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <h1 id="cafe-name" class="font-headline-xl text-headline-xl text-primary mb-1">...</h1>
                        <p id="cafe-description" class="font-body-md text-body-md text-on-surface-variant">...</p>
                    </div>
                    <div class="flex items-center gap-1 bg-primary/10 px-3 py-1 rounded-lg">
                        <span class="material-symbols-outlined text-primary text-[16px]"
                            style="font-variation-settings: 'FILL' 1;">star</span>
                        <span id="cafe-rating" class="font-label-sm text-label-sm text-primary">...</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 mb-6">
                    <span id="cafe-status-dot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span id="cafe-status" class="font-label-sm text-label-sm text-emerald-500">...</span>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-3 gap-3">
                    <button id="btn-call"
                        class="flex flex-col items-center justify-center gap-2 py-4 rounded-lg bg-surface-container-high border border-outline-variant/30 hover:bg-surface-variant transition-colors active:scale-95 duration-100">
                        <span class="material-symbols-outlined text-primary">call</span>
                        <span class="font-label-sm text-label-sm">اتصال</span>
                    </button>
                    <button id="btn-whatsapp"
                        class="flex flex-col items-center justify-center gap-2 py-4 rounded-lg bg-surface-container-high border border-outline-variant/30 hover:bg-surface-variant transition-colors active:scale-95 duration-100">
                        <span class="material-symbols-outlined text-primary">chat</span>
                        <span class="font-label-sm text-label-sm">واتساب</span>
                    </button>
                    <a id="location-link" href="navigation.html"
                        class="flex flex-col items-center justify-center gap-2 py-4 rounded-lg bg-surface-container-high border border-outline-variant/30 hover:bg-surface-variant transition-colors active:scale-95 duration-100">
                        <span class="material-symbols-outlined text-primary">location_on</span>
                        <span class="font-label-sm text-label-sm">اللوكيشن</span>
                    </a>
                </div>
            </div>
        </section>

        <!-- Menu Categories -->
        <section class="mt-8 px-margin-mobile">
            <h2 class="font-headline-lg text-headline-lg text-on-surface mb-4">المنيو</h2>
            <div id="categories-container" class="flex gap-3 overflow-x-auto scroll-hide pb-2">
                <button data-category="all"
                    class="category-btn px-6 py-2 bg-primary text-on-primary rounded-lg font-label-sm text-label-sm whitespace-nowrap">الكل</button>
                <button data-category="coffee"
                    class="category-btn px-6 py-2 bg-surface-container text-on-surface-variant rounded-lg font-label-sm text-label-sm border border-outline-variant/30 whitespace-nowrap">القهوة</button>
                <button data-category="cold"
                    class="category-btn px-6 py-2 bg-surface-container text-on-surface-variant rounded-lg font-label-sm text-label-sm border border-outline-variant/30 whitespace-nowrap">مشروبات
                    باردة</button>
                <button data-category="sweet"
                    class="category-btn px-6 py-2 bg-surface-container text-on-surface-variant rounded-lg font-label-sm text-label-sm border border-outline-variant/30 whitespace-nowrap">حلويات</button>
                <button data-category="sandwich"
                    class="category-btn px-6 py-2 bg-surface-container text-on-surface-variant rounded-lg font-label-sm text-label-sm border border-outline-variant/30 whitespace-nowrap">ساندوتشات</button>
            </div>
        </section>

        <!-- Menu Items Grid -->
        <section id="menu-items-container" class="mt-6 px-margin-mobile space-y-4">
            <!-- Rendered dynamically via JS -->
        </section>
    </main>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav
        class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-surface-container-high/90 backdrop-blur-md border-t border-outline-variant/30 rounded-t-xl shadow-lg">
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors"
            href="map.html">
            <span class="material-symbols-outlined">home</span>
            <span class="font-label-sm text-label-sm">الرئيسية</span>
        </a>
        <a class="flex flex-col items-center justify-center text-primary bg-primary-container/20 rounded-xl px-4 py-1.5 transition-all"
            href="browse.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">coffee_maker</span>
            <span class="font-bold text-[12px] mt-1">تصفح الكافيهات</span>
        </a>
    </nav>

    <!-- Navigation Drawer (Right Side) -->
    <div class="fixed inset-0 bg-black/60 z-[60] hidden backdrop-blur-sm opacity-0 transition-opacity duration-300"
        id="drawerOverlay"></div>
    <aside
        class="fixed top-0 right-0 h-full w-80 bg-surface-container shadow-2xl z-[70] transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col py-8 px-6"
        id="navDrawer">
        <div class="flex flex-col h-full">
            <!-- Drawer Links -->
            <nav class="flex flex-col gap-2 flex-grow">
                <a class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface hover:bg-surface-variant transition-all"
                    href="map.html">
                    <span class="material-symbols-outlined">home</span>
                    <span>الرئيسية</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface hover:bg-surface-variant transition-all"
                    href="browse.html">
                    <span class="material-symbols-outlined">coffee_maker</span>
                    <span>تصفح الكافيهات</span>
                </a>

            </nav>

            <footer class="text-center text-xs text-outline-variant mt-auto">
                Cloud Coffee v2.4.0
            </footer>
        </div>
    </aside>

    <!-- Shared State Management Scripts -->
    <script src="shared.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Get Cafe ID from query params
            const urlParams = new URLSearchParams(window.location.search);
            let cafeId = urlParams.get('id') || 'hodoo';

            // Fetch cafe data from shared.js getCafeById
            const cafe = getCafeById(cafeId);

            // Setup Favorite button click and state initialization
            const favBtn = document.getElementById('favorite-cafe-btn');
            const favIcon = document.getElementById('fav-heart-icon');

            const updateFavBtnState = () => {
                if (isCafeFavorite(cafeId)) {
                    favIcon.style.fontVariationSettings = "'FILL' 1";
                    favIcon.classList.add('text-primary');
                } else {
                    favIcon.style.fontVariationSettings = "'FILL' 0";
                    favIcon.classList.remove('text-primary');
                }
            };

            updateFavBtnState();

            favBtn.addEventListener('click', () => {
                const isFav = toggleFavoriteCafe(cafeId);
                updateFavBtnState();
                if (isFav) {
                    showToast(`تمت إضافة ${cafe.name} إلى المفضلة ❤️`, 'favorite');
                } else {
                    showToast(`تمت إزالة ${cafe.name} من المفضلة 🤍`, 'favorite');
                }
            });

            // 2. Populate shop header details
            document.getElementById('cafe-hero-image').src = cafe.image;
            document.getElementById('cafe-hero-image').alt = cafe.name;
            document.title = `Cloud Coffee | ${cafe.name} - القائمة`;
            document.getElementById('cafe-name').innerText = cafe.name;
            document.getElementById('cafe-description').innerText = cafe.description;
            document.getElementById('cafe-rating').innerText = `${cafe.rating} (${cafe.reviews})`;

            const statusText = document.getElementById('cafe-status');
            const statusDot = document.getElementById('cafe-status-dot');
            if (cafe.isOpen) {
                statusText.innerText = 'مفتوح الآن';
                statusText.className = 'font-label-sm text-label-sm text-emerald-500';
                statusDot.className = 'w-2 h-2 rounded-full bg-emerald-500 animate-pulse';
            } else {
                statusText.innerText = 'مغلق مؤقتاً';
                statusText.className = 'font-label-sm text-label-sm text-rose-500';
                statusDot.className = 'w-2 h-2 rounded-full bg-rose-500';
            }

            // 3. Quick action buttons setup
            document.getElementById('btn-call').onclick = () => {
                showToast(`جاري الاتصال بـ ${cafe.name} 📞`, 'call');
                setTimeout(() => {
                    window.location.href = `tel:${cafe.phone}`;
                }, 1000);
            };
            document.getElementById('btn-whatsapp').onclick = () => {
                showToast('جاري فتح محادثة الواتساب 💬', 'chat');
                setTimeout(() => {
                    window.open(`https://wa.me/${cafe.whatsapp.replace(/\+/g, '').replace(/ /g, '')}`, '_blank');
                }, 1000);
            };

            // 4. GPS and Walking directions setup
            let userLat = 24.7136; // Default Center
            let userLng = 46.6753;

            function updateLocationLink() {
                const cafeLat = userLat + cafe.latOffset;
                const cafeLng = userLng + cafe.lngOffset;
                const locationLink = document.getElementById('location-link');
                if (locationLink) {
                    locationLink.href = `navigation.html?userLat=${userLat}&userLng=${userLng}&cafeLat=${cafeLat}&cafeLng=${cafeLng}&name=${encodeURIComponent(cafe.name)}&distance=${encodeURIComponent(cafe.distance)}&time=${encodeURIComponent(cafe.time)}`;
                }
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        updateLocationLink();
                    },
                    (error) => {
                        console.warn('Geolocation failed or denied in menu page. Using defaults.', error);
                        updateLocationLink();
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                updateLocationLink();
            }

            // 5. Render Menu Items based on Category Filter
            const itemsContainer = document.getElementById('menu-items-container');

            function renderMenuItems(category = 'all') {
                // Smoothly fade out before re-rendering
                itemsContainer.style.opacity = '0';
                itemsContainer.style.transform = 'translateY(10px)';
                itemsContainer.style.transition = 'opacity 0.2s ease, transform 0.2s ease';

                setTimeout(() => {
                    itemsContainer.innerHTML = '';

                    const filteredItems = category === 'all'
                        ? cafe.menuItems
                        : cafe.menuItems.filter(item => item.category === category);

                    if (filteredItems.length === 0) {
                        itemsContainer.innerHTML = `
                        <div class="text-center py-12 text-on-surface-variant/60">
                            <span class="material-symbols-outlined text-[48px] mb-2 opacity-50">layers_clear</span>
                            <p class="font-medium text-sm">عذراً، لا توجد منتجات متوفرة حالياً في هذا القسم.</p>
                        </div>
                    `;
                    } else {
                        filteredItems.forEach((item, index) => {
                            const itemCard = document.createElement('div');
                            itemCard.className = 'flex items-center gap-4 bg-surface-container p-3 rounded-lg border border-outline-variant/10 hover:border-primary/40 transition-all group duration-300 opacity-0 transform translate-y-3';
                            itemCard.style.animation = `fadeInUp 0.3s ease forwards ${index * 0.05}s`;

                            itemCard.innerHTML = `
                            <div class="relative w-24 h-24 flex-shrink-0 overflow-hidden rounded-lg">
                                <img alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" src="${item.image}"/>
                            </div>
                            <div class="flex-grow">
                                <h3 class="font-headline-lg text-[20px] text-on-surface font-bold">${item.name}</h3>
                                <p class="font-body-md text-sm text-on-surface-variant opacity-80 mt-0.5 line-clamp-1">${item.description}</p>
                                <div class="mt-2 flex justify-between items-center">
                                    <span class="font-headline-lg text-lg text-primary font-bold">${item.price} ر.س</span>
                                </div>
                            </div>
                        `;
                            itemsContainer.appendChild(itemCard);
                        });
                    }

                    // Fade back in
                    itemsContainer.style.opacity = '1';
                    itemsContainer.style.transform = 'translateY(0)';
                }, 200);
            }

            // Add dynamic fadeInUp keyframes stylesheet if not present
            if (!document.getElementById('fadeInUpStyle')) {
                const style = document.createElement('style');
                style.id = 'fadeInUpStyle';
                style.textContent = `
                @keyframes fadeInUp {
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }
            `;
                document.head.appendChild(style);
            }

            // Initial render
            renderMenuItems('all');

            // 6. Hookup Category Chips Filtering
            const catButtons = document.querySelectorAll('.category-btn');
            catButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Remove active classes
                    catButtons.forEach(b => {
                        b.classList.remove('bg-primary', 'text-on-primary');
                        b.classList.add('bg-surface-container', 'text-on-surface-variant', 'border', 'border-outline-variant/30');
                    });

                    // Add active classes to clicked
                    btn.classList.add('bg-primary', 'text-on-primary');
                    btn.classList.remove('bg-surface-container', 'text-on-surface-variant', 'border', 'border-outline-variant/30');

                    const selectedCat = btn.getAttribute('data-category');

                    // Trigger dynamic filtering
                    renderMenuItems(selectedCat);
                });
            });


        });
    </script>
</body>

</html>
